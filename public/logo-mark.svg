<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 40" width="56" height="40">
  <!-- Pill container: dark bg, orange border -->
  <rect x="1" y="1" width="54" height="38" rx="19" ry="19"
        fill="#1a1a1a" stroke="#f8623a" stroke-width="1.5"/>
  <!-- Fist icon (minimalist, centered at 28,20) -->
  <!-- Palm base -->
  <rect x="18" y="22" width="20" height="9" rx="3" fill="#ebebe6"/>
  <!-- Index finger -->
  <rect x="20" y="13" width="4" height="12" rx="2" fill="#ebebe6"/>
  <!-- Middle finger -->
  <rect x="25" y="11" width="4" height="14" rx="2" fill="#ebebe6"/>
  <!-- Ring finger -->
  <rect x="30" y="13" width="4" height="12" rx="2" fill="#ebebe6"/>
  <!-- Thumb -->
  <rect x="14" y="22" width="5" height="4" rx="2" fill="#f8623a"/>
</svg>
